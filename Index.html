<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Météo Moderne</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/weather-icons/2.0.12/css/weather-icons.min.css">
</head>
<body>
    <div class="container">
        <h1>⛅ Météo en Temps Réel</h1>
        <div class="search-box">
            <input type="text" id="city-input" placeholder="Entrez une ville...">
            <button id="search-btn">Rechercher</button>
        </div>
        <div class="weather-card">
            <div class="weather-icon">
                <i id="weather-icon" class="wi wi-day-sunny"></i>
            </div>
            <div class="weather-info">
                <h2 id="city-name">Paris</h2>
                <p id="temperature">--°C</p>
                <p id="weather-description">Chargement...</p>
                <p id="wind">Vent: -- km/h</p>
                <p id="humidity">Humidité: --%</p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
